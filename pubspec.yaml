name: usman_portfolio
description: Muhammad Usman - Flutter Developer Portfolio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Navigation
  go_router: ^17.2.3

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  animate_do: ^3.3.4

  # UI
  google_fonts: ^8.1.0
  glassmorphism: ^3.0.0
  animated_text_kit: ^4.2.2
  visibility_detector: ^0.4.0+2
  flutter_staggered_animations: ^1.1.1

  # Utils
  url_launcher: ^6.2.5
  universal_html: ^2.2.4
  scroll_to_index: ^3.0.1

  # Icons
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/profile.png
    - assets/cv/usman_cv.pdf